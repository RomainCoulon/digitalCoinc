[settings]
# time in ns
lowerBoundGamma = 2176
upperBoundGamma = 3517
lowerDelayBound = -1570
upperDelayBound = -1373

#lowerBoundGamma = 2500
#upperBoundGamma = 4000
#lowerDelayBound = -1820
#upperDelayBound = -1600

gamma_dead_time = 10000

com_ext_deadTime_tdcr = 10000
coinc_wind_tdcr = 100
threshold_tdcr = 0
n_run_tdcr = 10

enlarge_window = 0.5

# n-sigma threshold above background used to detect the edges of the
# beta-gamma delay peak in the time-difference spectrum (autoDetectDelayBounds).
# Higher values → tighter window (less tail included).
auto_delay_n_sigma = 1000

# SESAM selective sampling settings (time in ns)
# sesam_coinc_exclusion is removed symmetrically from BOTH edges of the gap g
# and equivalently from BOTH edges of the plateau G, so both zones have the
# same effective width T_dead - 2*sesam_coinc_exclusion and the ratio
# N_g/N_G directly gives (1 - eps_beta) without any width normalisation.
sesam_coinc_exclusion = 1000

# Correlation counting (Lewis et al. 1973, Metrologia 9, 14)
# Length of each counting interval in ms.
# Optimal when ~5-10 events per interval per channel (rule of thumb: ~5/R_beta).
corr_interval_length = 1

kb = 1e-5
volSource = 10
n_MCtrial_tdcr = 1000