[settings]
# time in ns
lowerBoundGamma = 2176
upperBoundGamma = 3517
lowerDelayBound = -1570
upperDelayBound = -1373

#lowerBoundGamma = 2500
#upperBoundGamma = 4000
#lowerDelayBound = -1820
#upperDelayBound = -1600

gamma_dead_time = 10000

com_ext_deadTime_tdcr = 10000
coinc_wind_tdcr = 100
threshold_tdcr = 0
n_run_tdcr = 10

enlarge_window = 1

# n-sigma threshold above background used to detect the edges of the
# beta-gamma delay peak in the time-difference spectrum (autoDetectDelayBounds).
# Higher values → tighter window (less tail included).
auto_delay_n_sigma = 8

# SESAM selective sampling settings (time in ns)
# sesam_dead_time_ns: extended dead time used ONLY for SESAM (applied to the full
# df_beta_S stream so the gap [t0-T, t0) is truly free of all beta events).
# Must be >> coincidence peak width.  For NaI (slow), use ≥ 100 µs.
# com_ext_deadTime_tdcr can remain short for TDCR efficiency; SESAM uses its own.
sesam_dead_time_ns = 100000

# sesam_coinc_exclusion is removed symmetrically from BOTH edges of the gap g
# and equivalently from BOTH edges of the plateau G, so both zones have the
# same effective width (sesam_dead_time - 2*sesam_coinc_exclusion) and the
# ratio N_g/N_G directly gives (1 - eps_beta) without any width normalisation.
# Set to at least the FWHM of the coincidence peak (inspect sesam_spectrum plot).
sesam_coinc_exclusion = 2000

# Background correction for SESAM (cross-selective sampling, Haoran 2026 slide 12-13)
# Set True to apply S0 = S1 - S2 - S3 + S4 correction using background measurement files.
# Requires data_path_*_bck paths to be set in [paths].
use_bkg_correction = False

# Correlation counting (Lewis et al. 1973, Metrologia 9, 14)
# Length of each counting interval in ms.
# Optimal when ~5-10 events per interval per channel (rule of thumb: ~5/R_beta).
corr_interval_length = 1

kb = 1e-5
volSource = 10
n_MCtrial_tdcr = 1000